<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Amnesia Horizon · Recrutement Staff</title>
  <link rel="stylesheet" href="style.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      font-family: 'Arial', Tahoma, Geneva, Verdana, sans-serif;
    }

    .video-bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    .overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.65);
      z-index: -1;
    }

    .landing {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;     /* ← commence en haut au lieu du centre */
      align-items: center;
      text-align: center;
      color: white;
      padding: 3rem 2rem 2rem;         /* ← plus de place en haut, moins en bas */
      position: relative;
      z-index: 1;
    }

    /* Dégradé Miami pour le logo */
    .logo {
      font-size: 6.5rem;
      font-weight: bold;
      background: linear-gradient(190deg, 
        var(--miami-pink, #ff0080), 
        var(--miami-cyan, #ff0080), 
        var(--miami-orange, #ff8c00), 
        var(--miami-purple, #4a0080)
      );
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: -2rem 0 0.5rem 0;        /* ← remonte fortement le logo */
      text-shadow: 0 0 30px rgba(255, 0, 128, 0.6);
      letter-spacing: -1px;
    }

    .subtitle {
      font-size: 2.3rem;
      margin: 0.2rem 0 1rem;           /* ← réduit l'espace sous le sous-titre */
      opacity: 0.92;
      color: #ff00dd;
    }

    .tagline {
      font-size: 1.55rem;
      max-width: 820px;
      margin: 1rem 0 2rem;             /* ← espace réduit sous le tagline */
      line-height: 1.5;
      color: #af6e0b;
    }

    /* Bouton avec dégradé Miami + effet glow */
    .start-btn {
      background: linear-gradient(90deg, 
        var(--miami-blue, #ff0080), 
        var(--miami-orange, #ffae00), 
        var(--miami-orange, #ff8c00)
      );
      background-size: 200% 200%;
      color: white;
      border: none;
      padding: 1.3rem 4rem;
      font-size: 1.7rem;
      font-weight: bold;
      border-radius: 60px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 10px 30px rgba(255, 0, 128, 0.5);
      text-decoration: none;
      display: inline-block;
      animation: gradientMove 0s ease infinite;
      margin: 1rem 0 4rem;             /* ← espace raisonnable sous le bouton */
    }

    .start-btn:hover {
      transform: scale(1.12);
      box-shadow: 0 15px 45px rgba(0, 255, 255, 0.6);
      animation: gradientMove 0s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .info {
      margin-top: auto;                /* ← pousse l'info tout en bas pour libérer l'espace */
      font-size: 1.15rem;
      opacity: 2;
      max-width: 720px;
      color: #fd8230;
      padding-bottom: 2rem;
    }
  </style>
</head>
<body>

  <!-- Vidéo de fond -->
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="videos/background.mp4" type="video/mp4">
    Votre navigateur ne supporte pas la vidéo.
  </video>

  <div class="overlay"></div>

  <div class="landing">
    <div class="logo">Amnesia Horizon</div>
    <div class="subtitle">Serveur FiveM RP</div>

    <div class="tagline">
      Rejoignez une communauté sérieuse et respectueuse.<br>
      Devenez staff et participez à l'aventure.
    </div>

    <a href="informations.html" class="start-btn">
      COMMENCER LA CANDIDATURE
    </a>

    <div class="info">
      Phase 1 : Formulaire de candidature<br>
      Les tests Phase 2 (analyse) sont réservés aux candidats validés par le staff.
    </div>
  </div>

</body>
</html>
